name: Android Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PATH: keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEY_PASSWORD }} 
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/AnimeTrack-${{ github.ref_name }}.apk

      - name: Generate Custom Changelog
        id: changelog
        run: |
          # 优先读取 update/更新日志_<tag>.md 作为 Release body
          # 若文件不存在（例如直接在 main 分支 dispatch），回退到最近 10 条 commit 标题
          CHANGELOG_FILE="update/更新日志_${{ github.ref_name }}.md"
          echo "log_body<<EOF" >> $GITHUB_OUTPUT
          if [ -f "$CHANGELOG_FILE" ]; then
            cat "$CHANGELOG_FILE" >> $GITHUB_OUTPUT
          else
            git log --pretty=format:"- %s" -n 10 >> $GITHUB_OUTPUT
          fi
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: AnimeTrack ${{ github.ref_name }}
          body: |
            ${{ steps.changelog.outputs.log_body }}

            ---
            *由 GitHub Actions 自动构建*
          files: app/build/outputs/apk/release/AnimeTrack-${{ github.ref_name }}.apk
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}